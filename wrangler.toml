name = "kahoot-cf"
main = "src/index.ts"
# account_id will be auto-detected by `wrangler login` — uncomment + fill if needed:
# account_id = "your-cloudflare-account-id"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
routes = [
  { pattern = "kahoot.c11g.tw", custom_domain = true },
]

[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[d1_databases]]
binding = "DB"
database_name = "kahoot-cf"
# database_id will be filled after `make setup` creates the D1 database
database_id = "TBD-after-make-setup"

# Zero Trust Access — host app on kahoot-cf-host. Bypass apps
# (kahoot-cf-static, kahoot-cf-player-api) cover the public paths.
# Both values must be filled AFTER setting up Zero Trust Access in Cloudflare dashboard.
[vars]
CF_ACCESS_TEAM_DOMAIN = "TBD-your-team-name"  # e.g., "c11g" → c11g.cloudflareaccess.com
CF_ACCESS_AUD = "TBD-after-creating-host-access-app"  # 64-char hex from Access app settings
